# ============================================================
# GitHub Pages – CI/CD Deployment Workflow
# ============================================================
#
# PRE-REQUISITES (one-time, manual steps in GitHub UI):
#
#   1. REPO_NAME is injected automatically from the repository name.
#      If the intended GitHub Pages path differs, override REPO_NAME
#      in the "Build (static export)" step below and update next.config.ts.
#
#   2. Enable GitHub Pages:
#      Repository → Settings → Pages → Build and deployment
#      → Source: "Deploy from a branch"
#      → Branch: "gh-pages" / "/ (root)"
#      (The workflow pushes the built site to the gh-pages branch; GitHub
#       Pages then serves it from there. This avoids environment protection
#       rules that block the "GitHub Actions" source from deploying to main.)
#
#   3. Allow Actions to write to the repository:
#      Repository → Settings → Actions → General
#      → Workflow permissions → "Read and write permissions"
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# contents:write is required so peaceiris/actions-gh-pages can push to gh-pages.
permissions:
  contents: write

# Prevent overlapping deployments; cancel any queued run when a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"   # matches node:20-alpine used in Dockerfile
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_OUTPUT: export
          # Automatically set to the repository name (e.g. "todo-ai-3").
          # This becomes the basePath and assetPrefix in next.config.ts so that
          # all assets resolve correctly under https://<user>.github.io/<repo>/.
          # Override this value here if your intended basePath differs.
          REPO_NAME: ${{ github.event.repository.name }}
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # next build with output:'export' writes the static site to ./out
          publish_dir: ./out
          # Keep a clean deploy on every push (no commit history accumulation).
          force_orphan: true